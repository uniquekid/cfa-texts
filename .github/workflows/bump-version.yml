name: Bump Version & Tag

on:
  push:
    branches: [master]

jobs:
  bump:
    if: github.event.sender.login != 'cfa-texts-helper[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Mint App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.HELPER_APP_ID }}
          private-key: ${{ secrets.HELPER_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Count new sleeve files in this push
        id: sleeves
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.event.after }}"
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            COUNT=0
          else
            COUNT=$(git diff --name-only --diff-filter=A "$BEFORE" "$AFTER" -- 'Sprite/Sleeves/*' | wc -l)
          fi
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Bump Version.ini
        id: bump
        run: |
          OLD_TEXT=$(awk -F= '/^Text=/{print $2+0}' Version.ini)
          OLD_SLEEVE=$(awk -F= '/^Sleeve=/{print $2+0}' Version.ini)
          NEW_TEXT=$((OLD_TEXT + 1))
          NEW_SLEEVE=$((OLD_SLEEVE + ${{ steps.sleeves.outputs.count }}))
          sed -i "s/^Text=.*/Text=$NEW_TEXT/" Version.ini
          sed -i "s/^Sleeve=.*/Sleeve=$NEW_SLEEVE/" Version.ini
          echo "text=$NEW_TEXT" >> "$GITHUB_OUTPUT"
          echo "sleeve=$NEW_SLEEVE" >> "$GITHUB_OUTPUT"

      - name: Commit, tag, push
        env:
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BOT_USER_ID=$(gh api "/users/${APP_SLUG}[bot]" --jq .id)
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${BOT_USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com"
          git add Version.ini
          git commit -m "Bump Text=${{ steps.bump.outputs.text }}, Sleeve=${{ steps.bump.outputs.sleeve }}"
          git tag "v${{ steps.bump.outputs.text }}"
          git push origin HEAD:master
          git push origin "v${{ steps.bump.outputs.text }}"
